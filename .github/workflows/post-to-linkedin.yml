name: Sync Telegram to LinkedIn

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour. Change to '*/30 * * * *' for every 30 mins.
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

concurrency:
  group: sync-job
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for committing the state file back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch all history for git push

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TARGET_CHANNEL_ID: ${{ secrets.TARGET_CHANNEL_ID }}
          REPO_URL: "https://github.com/${{ github.repository }}"
        run: node index.js

      - name: Commit and push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f last_message_id.txt ]; then
            echo "last_message_id.txt not found, skipping commit."
            exit 0
          fi

          NEW_ID=$(cat last_message_id.txt)
          echo "New state ID: $NEW_ID"

          # Pull latest remote state BEFORE committing to avoid conflicts
          git fetch origin
          git reset --hard origin/main

          # Re-write our new ID on top of fresh remote state
          echo "$NEW_ID" > last_message_id.txt
          git add last_message_id.txt

          if git diff --staged --quiet; then
            echo "No changes to last_message_id.txt"
          else
            git commit -m "chore: update last processed message ID [skip ci]"
            git push --force
            echo "State updated: $NEW_ID"
          fi
